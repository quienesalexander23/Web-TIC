@if (dialogService.request(); as req) {
  <div class="modal-overlay">
    <div class="modal-container">
      <div class="modal-icon-container" [class.variant-danger]="req.variant === 'danger'">
        @if (req.variant === 'danger') {
          <svg xmlns="http://www.w3.org/2000/svg" class="modal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" class="modal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="16" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
        }
      </div>
      <h3 class="modal-title">{{ req.title }}</h3>
      <p class="modal-subtitle">{{ req.message }}</p>

      <div class="modal-actions">
        <button class="btn-cancel" (click)="dialogService.respond(false)">{{ req.cancelText }}</button>
        <button
          class="btn-confirm"
          [class.btn-confirm-danger]="req.variant === 'danger'"
          (click)="dialogService.respond(true)">{{ req.confirmText }}</button>
      </div>
    </div>
  </div>
}
