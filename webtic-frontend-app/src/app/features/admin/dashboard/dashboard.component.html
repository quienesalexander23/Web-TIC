<div class="dashboard-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="assets/EPN-LOGO.png" alt="Logo WebTIC FIS" class="sidebar-logo">
      <div class="header-text">
        <h2>Administration</h2>
        <p>WebTIC Portal</p>
      </div>
    </div>
    
    <nav class="sidebar-nav">
      <a *appHasRole="['Administrador']" routerLink="/admin/home" routerLinkActive="active" class="nav-item">
        <i class="icon-home"></i> Home
      </a>
      <a *appHasRole="['Administrador']" routerLink="/admin/users" routerLinkActive="active" class="nav-item">
        <i class="icon-users"></i> Users
      </a>
      <a *appHasRole="['Administrador']" routerLink="/admin/roles" routerLinkActive="active" class="nav-item">
        <i class="icon-shield"></i> Roles
      </a>
      <a *appHasRole="['Administrador']" routerLink="/admin/audit" routerLinkActive="active" class="nav-item">
        <i class="icon-file-text"></i> Audit Log
      </a>
      <a *appHasRole="['Administrador']" routerLink="/admin/settings" routerLinkActive="active" class="nav-item">
        <i class="icon-settings"></i> Settings
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="nav-logout-btn" (click)="openLogoutModal()">
        <svg xmlns="http://www.w3.org/2000/svg" class="logout-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Logout
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content">
    <!-- Top Navigation -->
    <header class="top-nav">
      <div class="top-brand">
        <h1>WebTIC FIS</h1>
      </div>
      <div class="top-actions">
        <button class="icon-btn"><i class="icon-bell"></i></button>
        <div class="user-profile" routerLink="/admin/profile" style="cursor: pointer;" title="Mi Perfil">
          <img src="assets/avatar-placeholder.png" alt="Profile" class="avatar">
        </div>
      </div>
    </header>

    <!-- Dynamic Content injected here -->
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>

<!-- Modal de Confirmación de Cierre de Sesión -->
@if (showLogoutModal) {
  <div class="modal-overlay">
    <div class="modal-container">
      <div class="modal-icon-container">
        <svg xmlns="http://www.w3.org/2000/svg" class="logout-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </div>
      <h3 class="modal-title">¿Está seguro que desea<br>cerrar su sesión?</h3>
      <p class="modal-subtitle">Su sesión actual en WebTIC FIS será<br>finalizada.</p>
      
      <div class="modal-actions">
        <button class="btn-cancel" (click)="closeLogoutModal()">Cancelar</button>
        <button class="btn-confirm-logout" (click)="confirmLogout()">Cerrar Sesión</button>
      </div>
    </div>
  </div>
}
