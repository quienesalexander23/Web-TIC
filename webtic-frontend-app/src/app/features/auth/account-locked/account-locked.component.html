<div class="auth-container">
  <div class="auth-card">
    <div class="logo-container">
      <img src="assets/images/EPN-LOGO.png" alt="EPN Logo" class="logo">
    </div>
    
    <div class="text-center" style="margin-bottom: 24px;">
      <div style="font-size: 48px; color: #ef4444; margin-bottom: 16px;">
        <i class="icon-lock"></i> <!-- Asumiendo un icono de candado -->
      </div>
      <h2 class="auth-title" style="color: #ef4444;">Acceso Bloqueado</h2>
      <p class="auth-subtitle">
        Tu cuenta ha sido suspendida temporalmente por seguridad tras registrar múltiples intentos fallidos de inicio de sesión.
      </p>
      <p class="auth-subtitle" style="margin-top: 8px;">
        Por favor, espera 15 minutos antes de volver a intentarlo o contacta al administrador del sistema.
      </p>
    </div>

    <button routerLink="/login" class="btn-primary" style="width: 100%;">
      Volver al Inicio de Sesión
    </button>
  </div>
</div>
